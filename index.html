<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Subscriptions Feed</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23ff0000'/%3E%3Cpolygon points='12,8 12,24 26,16' fill='%23fff'/%3E%3C/svg%3E">
<link rel="stylesheet" href="src/style.css">
</head>
<body>
<div class="wrapper">

<header>
  <h1>Subscriptions Feed <span id="status"></span></h1>
  <div id="controls">
    <div class="date-range">
      <button class="range-btn" data-days="3" aria-label="Show videos from last 3 days">3d</button>
      <button class="range-btn" data-days="7" aria-label="Show videos from last 7 days">7d</button>
      <button class="range-btn" data-days="14" aria-label="Show videos from last 14 days">14d</button>
      <button class="range-btn" data-days="30" aria-label="Show videos from last 30 days">30d</button>
    </div>
    <a id="yt-home" class="yt-link" href="https://www.youtube.com/" target="_blank" rel="noopener">YouTube ↗</a>
    <button id="theme-toggle" title="Toggle light/dark mode" aria-label="Toggle light/dark mode">☀</button>
    <button id="signin">Sign in with Google</button>
    <button id="refresh" disabled>Refresh</button>
  </div>
</header>

<div id="log" aria-live="polite"></div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-search">
      <input type="text" id="sidebar-search-input" placeholder="Search channels…">
    </div>
    <div class="sidebar-list" id="sidebar-list"></div>
  </aside>

  <div id="grid"></div>
</div>

</div>
<script type="module" src="src/main.js"></script>
</body>
</html>
