<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Subscriptions Feed</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1c1c1c;
    --text: #f1f1f1;
    --muted: #aaaaaa;
    --accent: #3ea6ff;
    --radius: 10px;
    --feed-width: 880px;
    --chip-bg: #2a2a2a;
    --chip-active: var(--accent);
    --chip-active-text: #000;
    --header-border: #2a2a2a;
  }
  .light {
    --bg: #f5f5f5;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #666666;
    --accent: #065fd4;
    --chip-bg: #e0e0e0;
    --chip-active: var(--accent);
    --chip-active-text: #fff;
    --header-border: #ddd;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    margin: 0;
    padding: 0 16px 60px;
  }
  .wrapper {
    max-width: var(--feed-width);
    margin: 0 auto;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 0;
    border-bottom: 1px solid var(--header-border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  h1 { font-size: 20px; margin: 0; font-weight: 600; }
  #status { color: var(--muted); font-size: 14px; margin-left: 12px; }
  button {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 20px;
    padding: 10px 20px;
    font-weight: 600;
    cursor: pointer;
    font-size: 15px;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  #controls { display: flex; align-items: center; gap: 12px; }
  .yt-link {
    color: var(--accent);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    opacity: 0.8;
    transition: opacity 0.15s;
  }
  .yt-link:hover { opacity: 1; }
  #theme-toggle {
    background: var(--chip-bg);
    color: var(--text);
    border: none;
    border-radius: 20px;
    width: 36px;
    height: 36px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .date-range {
    display: flex;
    background: var(--chip-bg);
    border-radius: 20px;
    padding: 3px;
    gap: 2px;
  }
  .range-btn {
    background: transparent;
    color: var(--muted);
    border: none;
    border-radius: 18px;
    padding: 5px 12px;
    font-weight: 600;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.15s, color 0.15s;
  }
  .range-btn.active {
    background: var(--chip-active);
    color: var(--chip-active-text);
  }
  .chips {
    display: none;
  }
  .sidebar-toggle {
    position: fixed;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--header-border);
    border-left: none;
    border-radius: 0 8px 8px 0;
    padding: 12px 8px;
    cursor: pointer;
    z-index: 20;
    font-size: 16px;
    transition: left 0.2s;
  }
  .sidebar-toggle:hover { background: var(--chip-bg); }
  .sidebar {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    width: 280px;
    background: var(--card);
    border-right: 1px solid var(--header-border);
    z-index: 30;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--header-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-header h2 {
    font-size: 15px;
    font-weight: 600;
    margin: 0;
  }
  .sidebar-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
  }
  .sidebar-close:hover { color: var(--text); }
  .sidebar-search {
    padding: 12px 16px;
    border-bottom: 1px solid var(--header-border);
  }
  .sidebar-search input {
    width: 100%;
    background: var(--chip-bg);
    border: none;
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  .sidebar-search input::placeholder { color: var(--muted); }
  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    cursor: pointer;
    transition: background 0.1s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    color: var(--text);
    font-size: 13px;
  }
  .sidebar-item:hover { background: var(--chip-bg); }
  .sidebar-item.active { background: var(--chip-active); color: var(--chip-active-text); }
  .sidebar-item.active .sidebar-item-count { color: var(--chip-active-text); opacity: 0.7; }
  .sidebar-item-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
  }
  .sidebar-item-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 500;
  }
  .sidebar-item-count {
    color: var(--muted);
    font-size: 12px;
    flex-shrink: 0;
  }
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 25;
  }
  .sidebar.open ~ .sidebar-overlay { display: block; }
  @media (min-width: 900px) {
    .sidebar { width: 300px; }
  }
  #grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-top: 28px;
  }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    text-decoration: none;
    color: var(--text);
    display: flex;
    gap: 0;
  }
  .card-body {
    flex: 1;
    padding: 20px 22px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 0;
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
  }
  .card-channel {
    font-size: 14px;
    color: var(--accent);
    margin: 0;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .card-title {
    font-size: 18px;
    font-weight: 600;
    line-height: 1.35;
    margin: 0;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-desc {
    font-size: 14px;
    color: var(--muted);
    margin: 0;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.5;
  }
  .card-meta {
    font-size: 13px;
    color: var(--muted);
    margin: 0;
    margin-top: auto;
    opacity: 0.7;
  }
  .card-thumb {
    width: 400px;
    min-width: 400px;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
  }
  #log {
    color: var(--muted);
    font-size: 14px;
    margin-top: 18px;
    white-space: pre-line;
  }
</style>
</head>
<body>
<div class="wrapper">

<header>
  <h1>Subscriptions Feed <span id="status"></span></h1>
  <div id="controls">
    <div class="date-range">
      <button class="range-btn active" data-days="3">3d</button>
      <button class="range-btn" data-days="7">7d</button>
      <button class="range-btn" data-days="14">14d</button>
      <button class="range-btn" data-days="30">30d</button>
    </div>
    <a id="yt-home" class="yt-link" href="https://www.youtube.com/" target="_blank" rel="noopener">YouTube ↗</a>
    <button id="theme-toggle" title="Toggle light/dark mode">☀</button>
    <button id="signin">Sign in with Google</button>
    <button id="refresh" disabled>Refresh</button>
  </div>
</header>

<div id="chips" class="chips"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>Channels</h2>
    <button class="sidebar-close" id="sidebar-close">&times;</button>
  </div>
  <div class="sidebar-search">
    <input type="text" id="sidebar-search-input" placeholder="Search channels…">
  </div>
  <div class="sidebar-list" id="sidebar-list"></div>
</div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<button class="sidebar-toggle" id="sidebar-toggle" title="Filter by channel">☰</button>

<div id="log"></div>
<div id="grid"></div>

</div>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
