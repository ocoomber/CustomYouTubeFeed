<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Subscriptions Feed</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1c1c1c;
    --text: #f1f1f1;
    --muted: #aaaaaa;
    --accent: #3ea6ff;
    --radius: 10px;
    --feed-width: 880px;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    margin: 0;
    padding: 0 16px 60px;
  }
  .wrapper {
    max-width: var(--feed-width);
    margin: 0 auto;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 0;
    border-bottom: 1px solid #2a2a2a;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  h1 { font-size: 20px; margin: 0; font-weight: 600; }
  #status { color: var(--muted); font-size: 14px; margin-left: 12px; }
  button {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 20px;
    padding: 10px 20px;
    font-weight: 600;
    cursor: pointer;
    font-size: 15px;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  #controls { display: flex; align-items: center; gap: 12px; }
  .yt-link {
    color: var(--accent);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    opacity: 0.8;
    transition: opacity 0.15s;
  }
  .yt-link:hover { opacity: 1; }
  #grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-top: 28px;
  }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    text-decoration: none;
    color: var(--text);
    display: flex;
    gap: 0;
  }
  .card-body {
    flex: 1;
    padding: 20px 22px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 0;
  }
  .card-channel {
    font-size: 14px;
    color: var(--accent);
    margin: 0;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .card-title {
    font-size: 18px;
    font-weight: 600;
    line-height: 1.35;
    margin: 0;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-desc {
    font-size: 14px;
    color: var(--muted);
    margin: 0;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.5;
  }
  .card-meta {
    font-size: 13px;
    color: var(--muted);
    margin: 0;
    margin-top: auto;
    opacity: 0.7;
  }
  .card-thumb {
    width: 400px;
    min-width: 400px;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
  }
  #log {
    color: var(--muted);
    font-size: 14px;
    margin-top: 18px;
    white-space: pre-line;
  }
</style>
</head>
<body>
<div class="wrapper">

<header>
  <h1>Subscriptions Feed <span id="status"></span></h1>
  <div id="controls">
    <a id="yt-home" class="yt-link" href="https://www.youtube.com/feed/subscriptions?sp=EgIIAw%3D%3D" target="_blank" rel="noopener">YouTube Home ↗</a>
    <button id="signin">Sign in with Google</button>
    <button id="refresh" disabled>Refresh</button>
  </div>
</header>

<div id="log"></div>
<div id="grid"></div>

</div>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
