<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Subscriptions Feed</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1c1c1c;
    --text: #f1f1f1;
    --muted: #aaaaaa;
    --accent: #3ea6ff;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    margin: 0;
    padding: 0 16px 60px;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 4px;
    border-bottom: 1px solid #2a2a2a;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  h1 { font-size: 18px; margin: 0; font-weight: 600; }
  #status { color: var(--muted); font-size: 13px; margin-left: 12px; }
  button {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 18px;
    padding: 8px 16px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  #controls { display: flex; align-items: center; gap: 10px; }
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 18px;
    margin-top: 20px;
  }
  .card {
    background: var(--card);
    border-radius: 10px;
    overflow: hidden;
    text-decoration: none;
    color: var(--text);
    display: block;
  }
  .card img { width: 100%; display: block; aspect-ratio: 16/9; object-fit: cover; }
  .card .body { padding: 10px 12px; }
  .card .title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.3;
    margin: 0 0 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card .meta { font-size: 12px; color: var(--muted); margin: 0; }
  #log {
    color: var(--muted);
    font-size: 13px;
    margin-top: 16px;
    white-space: pre-line;
  }
</style>
</head>
<body>

<header>
  <h1>Subscriptions Feed <span id="status"></span></h1>
  <div id="controls">
    <button id="signin">Sign in with Google</button>
    <button id="refresh" disabled>Refresh</button>
  </div>
</header>

<div id="log"></div>
<div id="grid"></div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
